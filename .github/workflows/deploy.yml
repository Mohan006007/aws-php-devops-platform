name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # Checkout code
    - name: Checkout Code
      uses: actions/checkout@v3

    # Configure AWS
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # Login to ECR (GitHub runner)
    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v1

    # Build Docker image
    - name: Build Docker Image
      run: |
        docker build -t php-app -f docker/Dockerfile .

    # Tag image correctly
    - name: Tag Image
      run: |
        docker tag php-app:latest ${{ secrets.ECR_REPOSITORY }}:latest

    # Push to ECR
    - name: Push to ECR
      run: |
        docker push ${{ secrets.ECR_REPOSITORY }}:latest

    # Deploy to EC2
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Install AWS CLI if not present
          if ! command -v aws &> /dev/null
          then
            sudo apt update -y
            sudo apt install awscli -y
          fi

          # Login to ECR from EC2
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
          docker login --username AWS --password-stdin $(echo ${{ secrets.ECR_REPOSITORY }} | cut -d'/' -f1)

          # Pull latest image
          docker pull ${{ secrets.ECR_REPOSITORY }}:latest

          # Stop and remove old container
          docker stop php-container || true
          docker rm php-container || true

          # Run new container
          docker run -d -p 80:80 \
            -e DB_HOST=php-mysql-db.cb2k688est0l.ap-south-1.rds.amazonaws.com \
            -e DB_USER=admin \
            -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -e DB_NAME=testdb \
            --name php-container \
            ${{ secrets.ECR_REPOSITORY }}:latest