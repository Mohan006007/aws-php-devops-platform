name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # Configure AWS
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # Login to ECR
    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v1

    # Build Docker Image
    - name: Build Docker Image
      run: |
        docker build -t php-app -f docker/Dockerfile .

    # Tag Image
    - name: Tag Image
      run: |
        docker tag php-app:latest ${{ secrets.ECR_REPOSITORY }}:latest

    # Push Image
    - name: Push to ECR
      run: |
        docker push ${{ secrets.ECR_REPOSITORY }}:latest

    # Deploy to EC2
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull ${{ secrets.ECR_REPOSITORY }}:latest

          docker stop php-container || true
          docker rm php-container || true

          docker run -d -p 80:80 \
            -e DB_HOST=php-mysql-db.cb2k688est0l.ap-south-1.rds.amazonaws.com \
            -e DB_USER=admin \
            -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -e DB_NAME=testdb \
            --name php-container \
            ${{ secrets.ECR_REPOSITORY }}:latest