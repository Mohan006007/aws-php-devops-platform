name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Configure AWS credentials
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # 3. Login to Amazon ECR
    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v1

    # 4. Build Docker image
    - name: Build Docker Image
      run: |
        docker build -t php-app -f docker/Dockerfile .

    # 5. Tag Docker image
    - name: Tag Image
      run: |
        docker tag php-app:latest ${{ secrets.ECR_REPOSITORY }}:latest

    # 6. Push image to ECR
    - name: Push to ECR
      run: |
        docker push ${{ secrets.ECR_REPOSITORY }}:latest

    # 7. Deploy to EC2
    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Install AWS CLI v2 if missing
          if ! command -v aws &> /dev/null
          then
            sudo apt update -y
            sudo apt install unzip -y
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip awscliv2.zip
            sudo ./aws/install
          fi

          # Login to ECR
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
          docker login --username AWS --password-stdin $(echo ${{ secrets.ECR_REPOSITORY }} | cut -d'/' -f1)

          # Pull latest image
          docker pull ${{ secrets.ECR_REPOSITORY }}:latest

          # Stop and remove old container
          docker stop php-container || true
          docker rm php-container || true

          # Run new container
          docker run -d -p 80:80 \
            -e DB_HOST=php-mysql-db.cb2k688est0l.ap-south-1.rds.amazonaws.com \
            -e DB_USER=admin \
            -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -e DB_NAME=testdb \
            --name php-container \
            ${{ secrets.ECR_REPOSITORY }}:latest